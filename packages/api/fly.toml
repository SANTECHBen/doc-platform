# Fly.io config — deploy from packages/api or use --config flag.
# CLI: cd packages/api && flyctl launch --no-deploy, then set secrets, then fly deploy.

app = "equipment-hub-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  # Build from the monorepo root so the Dockerfile can pull workspace packages.
  # Run `flyctl deploy --dockerfile packages/api/Dockerfile` from repo root.

[env]
  NODE_ENV = "production"
  API_HOST = "0.0.0.0"
  API_PORT = "3001"
  # UPLOADS_DIR unused in prod — S3_BUCKET is set, so the S3 adapter is picked.

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  # SSE streams can run up to Fly's request cap (~5 min by default, longer on
  # extended-timeout plans). Plenty for a chat turn.

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  # 2 CPUs because the streaming PDF extraction shells out to qpdf, which is
  # CPU-bound and single-threaded. On a single-CPU box, qpdf saturated the
  # core and starved Node's event loop long enough to fail the proxy's
  # health check — the process was alive but unable to respond to /health,
  # so requests started 502-ing. With 2 cores Node always has cycles for
  # I/O and health checks while qpdf chews through a chunk.
  #
  # 2 GB gives headroom for the largest plausible chunk staying in memory
  # (~32 MB raw + ~43 MB base64 + Anthropic SDK request body) without GC
  # pauses long enough to be confused for unresponsiveness.
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
