# Fly.io config — deploy from packages/api or use --config flag.
# CLI: cd packages/api && flyctl launch --no-deploy, then set secrets, then fly deploy.
#
# Two processes share this image:
#   - app:    Fastify HTTP server (admin + PWA + scan APIs)
#   - worker: extraction loop (polls documents.extraction_status='pending',
#             runs the LlamaParse → chunk → embed pipeline)
#
# Splitting them means a misbehaving worker (OOM, hung qpdf, slow upload)
# never takes down the admin UI. Each process group gets its own machine
# with its own VM size and restart lifecycle.

app = "equipment-hub-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  # Build from the monorepo root so the Dockerfile can pull workspace packages.
  # Run `flyctl deploy --dockerfile packages/api/Dockerfile` from repo root.

[env]
  NODE_ENV = "production"
  API_HOST = "0.0.0.0"
  API_PORT = "3001"

[processes]
  # `app` runs migrations on boot, then serves HTTP. Public routes attach
  # to this process via http_service.processes below.
  app = "pnpm start:prod"
  # `worker` runs the extraction loop. No HTTP listener; pulls jobs from
  # documents.extraction_status = 'pending' via SELECT FOR UPDATE SKIP LOCKED.
  worker = "pnpm start:worker"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  # Only the `app` process exposes HTTP. The worker has no public surface.
  processes = ["app"]
  # SSE streams can run up to Fly's request cap (~5 min by default, longer on
  # extended-timeout plans). Plenty for a chat turn.

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  # App process: keep it lean. It does no extraction work anymore, so 1 GB
  # is plenty for Fastify + a Drizzle pool + the occasional small upload.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["app"]

[[vm]]
  # Worker process: sized for the worst-case extraction. The LlamaParse
  # URL hand-off keeps memory low (file never enters the worker), but the
  # buffered fallback path needs headroom for fs.readFile + Blob + undici
  # request body = ~3-4x file size transient. 2 GB covers a ~200 MB PDF.
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["worker"]
