# Fly.io config — deploy from packages/api or use --config flag.
# CLI: cd packages/api && flyctl launch --no-deploy, then set secrets, then fly deploy.

app = "equipment-hub-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  # Build from the monorepo root so the Dockerfile can pull workspace packages.
  # Run `flyctl deploy --dockerfile packages/api/Dockerfile` from repo root.

[env]
  NODE_ENV = "production"
  API_HOST = "0.0.0.0"
  API_PORT = "3001"
  # UPLOADS_DIR unused in prod — S3_BUCKET is set, so the S3 adapter is picked.

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  # SSE streams can run up to Fly's request cap (~5 min by default, longer on
  # extended-timeout plans). Plenty for a chat turn.

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  # performance CPU kind because shared-CPU machines have burst-credit
  # throttling — once the machine sustains 100% CPU for ~30 seconds (which
  # large PDF extraction does easily: qpdf splitting + base64 encoding +
  # 43 MB Anthropic upload + TLS), Fly drops you to the baseline allocation
  # and the event loop can't keep up with health checks. Performance CPU
  # has guaranteed full cores with no throttling, so extraction can run as
  # long as it needs to and the API stays responsive throughout.
  #
  # 2 GB covers the working set: ~120 MB source file on disk, ~32 MB
  # chunk in RAM, ~43 MB base64 string, ~50 MB Anthropic SDK request body
  # + Node baseline + Drizzle pool.
  memory = "2gb"
  cpu_kind = "performance"
  cpus = 1
